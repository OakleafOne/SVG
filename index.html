<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel ="stylesheet" href= "https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel ="stylesheet" href ="styles/index.css">
    <title>Invitation</title>
</head>
<body>
    
    <div class ="text-card animate__animated animate__fadeInDown">
            <div class ="moving-text">
                <h1>You're invited!</h1>
            </div>

            <div class ="icon-container">
                <div class ="icon-box">
                    <svg width ="100" height ="100" viewbox ="0 0 512 512" class ="svg-check">
                        <circle cx ="256" cy ="256" r ="240" fill ="transparent" stroke ="#45b39d" stroke-width ="32" />
                        <path d ="m150 250 l70 70 l140 -140" fill ="none" stroke ="#45b39d" stroke-width ="45" stroke-linecap ="round" stroke-linejoin ="round"/>
                    </svg>
                    <span class ="accept-decline">Accept</span>
                </div>

                <div class ="icon-box">
                    <img src ="images/decline.svg" alt ="decline" class ="svg-decline">
                    <span class ="accept-decline">Decline</span>
                </div>
            </div>
                
            </div>
    </div>
    
</body>
</html>
